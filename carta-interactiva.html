<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta para Camila 💌</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background: linear-gradient(to bottom, #0f172a, #1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, sans-serif;
}

/* Fondo */
.fondo{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    color:rgba(255,255,255,0.08);
    font-weight:bold;
    text-align:center;
    animation: brillo 4s infinite alternate;
}

@keyframes brillo{
    from{
        transform:scale(1);
        opacity:0.1;
    }
    to{
        transform:scale(1.05);
        opacity:0.25;
    }
}

/* Carta */
.carta{
    position:relative;
    width:320px;
    height:220px;
    background:#ffccd5;
    border-radius:15px;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    transition:1s;
    overflow:hidden;
    z-index:10;
}

.carta:hover{
    transform:scale(1.03);
}

/* Tapa */
.tapa{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff8fab;
    clip-path:polygon(0 0, 100% 0, 50% 55%);
    transform-origin:top;
    transition:1s;
    z-index:5;
}

/* Texto */
.mensaje{
    position:absolute;
    width:100%;
    top:75%;
    text-align:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    z-index:6;
}

/* Flores */
.flores{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    opacity:0;
    transition:2s;
}

/* Flor 3D */
.flor{
    position:relative;
    width:90px;
    height:90px;
    transform-style:preserve-3d;
    animation:girar 6s linear infinite;
}

.petalo{
    position:absolute;
    width:35px;
    height:60px;
    background:linear-gradient(to bottom,#ff4d6d,#ff8fab);
    border-radius:50%;
    left:28px;
    top:15px;
    transform-origin:center 45px;
    box-shadow:0 0 10px rgba(255,255,255,0.5);
}

.petalo:nth-child(1){ transform:rotate(0deg) translateY(-20px);}
.petalo:nth-child(2){ transform:rotate(45deg) translateY(-20px);}
.petalo:nth-child(3){ transform:rotate(90deg) translateY(-20px);}
.petalo:nth-child(4){ transform:rotate(135deg) translateY(-20px);}
.petalo:nth-child(5){ transform:rotate(180deg) translateY(-20px);}
.petalo:nth-child(6){ transform:rotate(225deg) translateY(-20px);}
.petalo:nth-child(7){ transform:rotate(270deg) translateY(-20px);}
.petalo:nth-child(8){ transform:rotate(315deg) translateY(-20px);}

.centro{
    position:absolute;
    width:35px;
    height:35px;
    background:gold;
    border-radius:50%;
    top:28px;
    left:28px;
    z-index:2;
    box-shadow:0 0 15px gold;
}

/* Animación */
@keyframes girar{
    from{
        transform:rotateY(0deg) rotateX(10deg);
    }
    to{
        transform:rotateY(360deg) rotateX(10deg);
    }
}

/* Carta abierta */
.abierta .tapa{
    transform:rotateX(180deg);
}

.abierta{
    width:100vw;
    height:100vh;
    border-radius:0;
    background:transparent;
    box-shadow:none;
}

.abierta .mensaje{
    display:none;
}

.abierta .flores{
    opacity:1;
}

</style>
</head>

<body>

<div class="fondo">
    CAMILA TE QUIERO MUCHO 💖
</div>

<div class="carta" onclick="abrirCarta(this)">

    <div class="tapa"></div>

    <div class="mensaje">
        💌 Presiona para abrir carta
    </div>

    <div class="flores">

        <div class="flor">
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="centro"></div>
        </div>

        <div class="flor">
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="centro"></div>
        </div>

        <div class="flor">
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="petalo"></div>
            <div class="centro"></div>
        </div>

    </div>

</div>

<script>
function abrirCarta(carta){
    carta.classList.add("abierta");
}
</script>

</body>
</html>
