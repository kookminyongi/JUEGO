<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Corazones Flotando</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .contenedor {
      text-align: center;
      z-index: 10;
      color: white;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    p {
      font-size: 24px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }

    .corazon {
      position: fixed;
      pointer-events: none;
      font-size: 30px;
      animation: flotar 6s ease-in infinite;
    }

    @keyframes flotar {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) rotate(360deg);
        opacity: 0;
      }
    }

    .corazon1 { animation-duration: 6s; animation-delay: 0s; }
    .corazon2 { animation-duration: 7s; animation-delay: 0.5s; }
    .corazon3 { animation-duration: 8s; animation-delay: 1s; }
    .corazon4 { animation-duration: 6.5s; animation-delay: 1.5s; }
    .corazon5 { animation-duration: 7.5s; animation-delay: 2s; }
    .corazon6 { animation-duration: 6s; animation-delay: 2.5s; }
    .corazon7 { animation-duration: 8s; animation-delay: 3s; }
    .corazon8 { animation-duration: 7s; animation-delay: 3.5s; }
  </style>
</head>

<body>

  <div class="contenedor">
    <h1>💖 Te Amo 💖</h1>
    <p>Mira cómo los corazones flotan...</p>
  </div>

  <script>
    function crearCorazon() {
      const corazon = document.createElement('div');
      corazon.classList.add('corazon');
      corazon.textContent = '❤️';
      
      // Posición aleatoria en X
      const posX = Math.random() * window.innerWidth;
      corazon.style.left = posX + 'px';
      corazon.style.bottom = '-50px';
      
      // Elegir una animación aleatoria
      const clases = ['corazon1', 'corazon2', 'corazon3', 'corazon4', 'corazon5', 'corazon6', 'corazon7', 'corazon8'];
      const claseAleatoria = clases[Math.floor(Math.random() * clases.length)];
      corazon.classList.add(claseAleatoria);
      
      document.body.appendChild(corazon);
      
      // Eliminar el elemento después de la animación
      setTimeout(() => {
        corazon.remove();
      }, 8000);
    }

    // Crear corazones continuamente
    setInterval(crearCorazon, 300);

    // Crear algunos corazones al inicio
    for (let i = 0; i < 5; i++) {
      crearCorazon();
    }
  </script>

</body>
</html>
